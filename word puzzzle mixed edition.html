<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Puzzle - Mixed Audio Edition</title>
    <style>
        :root {
            --bg: #0b0f19;
            --panel: #151f32;
            --accent: #f59e0b;
            --accent-hover: #fbbf24;
            --text: #f8fafc;
            --muted: #64748b;
            --correct: #10b981;
            --wrong: #ef4444;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .game-card {
            background-color: var(--panel);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 440px;
            text-align: center;
            border: 1px solid #1e293b;
        }

        h1 {
            margin-top: 0;
            font-size: 2.2rem;
            letter-spacing: 4px;
            color: var(--accent);
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(245, 158, 11, 0.3);
            margin-bottom: 5px;
        }

        .level-badge {
            display: inline-block;
            background: rgba(245, 158, 11, 0.2);
            color: var(--accent);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: bold;
            margin-bottom: 15px;
            border: 1px solid rgba(245, 158, 11, 0.4);
        }

        .audio-control {
            margin-bottom: 20px;
            background: #1e293b;
            padding: 6px 12px;
            border-radius: 30px;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.8rem;
            cursor: pointer;
            border: 1px solid #334155;
            color: var(--muted);
            user-select: none;
        }
        .audio-controlNodeActive {
            color: var(--accent);
            border-color: var(--accent);
        }

        .scrambled-word {
            background: rgba(0, 0, 0, 0.3);
            padding: 20px;
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 12px;
            border-radius: 12px;
            margin: 15px 0;
            color: #fff;
            border: 1px dashed #334155;
            text-transform: uppercase;
        }

        .hint-box {
            font-size: 1rem;
            color: #94a3b8;
            margin-bottom: 25px;
            min-height: 45px;
            line-height: 1.4;
        }

        input {
            width: 100%;
            padding: 14px;
            box-sizing: border-box;
            border: 2px solid #1e293b;
            border-radius: 10px;
            background-color: #0b0f19;
            color: white;
            font-size: 1.4rem;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 4px;
            outline: none;
            margin-bottom: 15px;
            transition: all 0.2s;
        }

        input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 10px rgba(245, 158, 11, 0.2);
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            background-color: var(--accent);
            color: #0b0f19;
        }

        button:hover { background-color: var(--accent-hover); }
        button:active { transform: scale(0.98); }

        .play-again-btn {
            background-color: #1e293b;
            color: #fff;
            margin-top: 15px;
            display: none;
        }
        .play-again-btn:hover { background-color: #2d3748; }

        .feedback {
            margin-top: 15px;
            min-height: 24px;
            font-weight: bold;
            font-size: 1.1rem;
            line-height: 1.4;
        }

        .score-board {
            margin-top: 20px;
            font-size: 0.95rem;
            color: var(--muted);
            border-top: 1px solid #1e293b;
            padding-top: 15px;
            display: flex;
            justify-content: space-between;
        }

        .hidden { display: none !important; }
    </style>
</head>
<body>

    <audio id="bg-music" playsinline preload="auto">
        <source id="audio-source" src="" type="audio/mpeg">
    </audio>

    <div class="game-card">
        <h1>Word Puzzle</h1>
        <div class="level-badge" id="levelDisplay">Generating Map...</div>
        <br>
        <div class="audio-control" id="audioToggle">
            Answering / Interacting loads tracks...
        </div>
        
        <div id="gamePlayArea">
            <div class="scrambled-word" id="scrambledWord">----</div>
            <div class="hint-box" id="hintBox">Interacting loads the session...</div>

            <input type="text" id="userInput" placeholder="Type answer..." maxlength="4" autocomplete="off">
            <button id="checkBtn">Verify Answer</button>
        </div>

        <button id="resetBtn" class="play-again-btn">Play Again (Reshuffle Pool)</button>

        <div class="feedback" id="feedback"></div>
        
        <div class="score-board">
            <span>Type: <strong id="catDisplay" style="color:#fff;">4-Letters</strong></span>
            <span>Score: <strong id="scoreDisplay" style="color: var(--accent);">0</strong></span>
        </div>
    </div>

<script>
    const bgMusic = document.getElementById("bg-music");
    const audioSource = document.getElementById("audio-source");
    const audioToggle = document.getElementById("audioToggle");

    let isMusicPlaying = false;
    let currentTrackIndex = 0;

    // Configured Playlist Array - Plays one after another automatically
    const PLAYLIST = [
        {
            name: "Ceylon Rap",
            url: "https://www.dropbox.com/scl/fi/gw1dbmzgehxkk94gcvkgu/rap-ceylon-vaaheeshan-rasaiya-STUDIO-ASK-STUDIO-ASK.mp3?rlkey=flyrxuhq1g9a6xnmdnpk90can&st=6itx6rsf&dl=1"
        },
        {
            name: "Viduthalai Kural",
            url: "https://www.dropbox.com/scl/fi/xx92f5kg3nkwpjyp4x4en/eeal-songs-officialsite-Tamilar-Viduthalai-Kural.mp3?rlkey=r4czc00hdigcj2d6vkpwesm32&st=0hnbiqur&dl=1"
        }
    ];

    bgMusic.volume = 0.40;

    function initTrack() {
        audioSource.src = PLAYLIST[currentTrackIndex].url;
        bgMusic.load();
        updateAudioButtonUI();
    }

    function updateAudioButtonUI() {
        if (isMusicPlaying) {
            audioToggle.textContent = `🔊 Playing: ${PLAYLIST[currentTrackIndex].name} (Click to Pause)`;
            audioToggle.classList.add("audio-controlNodeActive");
        } else {
            audioToggle.textContent = `🔇 BGM: Off (Click to Play ${PLAYLIST[currentTrackIndex].name})`;
            audioToggle.classList.remove("audio-controlNodeActive");
        }
    }

    // Automatically transition to next song once current song ends
    bgMusic.addEventListener("ended", () => {
        currentTrackIndex = (currentTrackIndex + 1) % PLAYLIST.length; // Loop back around to track 0
        audioSource.src = PLAYLIST[currentTrackIndex].url;
        bgMusic.load();
        bgMusic.play().then(() => {
            isMusicPlaying = true;
            updateAudioButtonUI();
        }).catch(() => {
            isMusicPlaying = false;
            updateAudioButtonUI();
        });
    });

    audioToggle.addEventListener("click", () => {
        initSFXEngine();
        if (bgMusic.paused) {
            bgMusic.play()
                .then(() => {
                    isMusicPlaying = true;
                    updateAudioButtonUI();
                })
                .catch(e => {
                    console.error("Playback restriction dropped:", e);
                });
        } else {
            bgMusic.pause();
            isMusicPlaying = false;
            updateAudioButtonUI();
        }
    });

    // Native Web Audio Engine Context for Sound Effects (SFX)
    let sfxContext = null;

    function initSFXEngine() {
        if (!sfxContext) {
            sfxContext = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (sfxContext.state === 'suspended') {
            sfxContext.resume();
        }
    }

    function playTone(frequencies, type, duration, volume) {
        initSFXEngine();
        if (!sfxContext) return;

        frequencies.forEach((freq, index) => {
            setTimeout(() => {
                try {
                    let osc = sfxContext.createOscillator();
                    let gainNode = sfxContext.createGain();
                    
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, sfxContext.currentTime);
                    
                    gainNode.gain.setValueAtTime(volume, sfxContext.currentTime);
                    gainNode.gain.exponentialRampToValueAtTime(0.00001, sfxContext.currentTime + duration);
                    
                    osc.connect(gainNode);
                    gainNode.connect(sfxContext.destination);
                    
                    osc.start();
                    osc.stop(sfxContext.currentTime + duration);
                } catch(e) {}
            }, index * 100);
        });
    }

    function playCorrectSFX() {
        playTone([523.25, 659.25, 783.99, 1046.50], 'sine', 0.3, 0.15);
    }

    function playWrongSFX() {
        playTone([220.00, 146.83], 'sawtooth', 0.6, 0.2);
    }

    // Vocabulary matrices
    const BASE_NOUNS = ["LION","DUCK","FROG","FISH","BIRD","DEER","BEAR","WOLF","GOAT","CRAB","BOOK","DOOR","LAMP","DESK","COAT","BOAT","BALL","COIN","KEYS","SOAP","MILK","PEAR","RICE","CAKE","SOUP","MEAT","SALT","CORN","PLUM","BUNS","TREE","RAIN","WIND","STAR","MOON","FIRE","SAND","SNOW","ROCK","WAVE","BLUE","PINK","RING","SHOE","VEST","GOLD","GRAY","BELT","BOOT","PARK","HOME","ROAD","ROOM","SHOP","YARD","FARM","WALL","TENT","BANK","HAND","FOOT","HAIR","EYES","FACE","NOSE","KNEE","BONE","NECK","TIME","NAME","NEWS","GAME","TOYS","GIFT","CARD","FLAG","WISH","PLAN","BARK","ROPE","SOIL","CLAY","LEAF","SEED","ROOT","POND","LAKE","HILL","CAMP","PATH","GATE","ROOF","YARD","DECK","SOFA","FAIR","CITY"];
    const BASE_VERBS = ["WALK","JUMP","COOK","WASH","SING","RIDE","BAKE","TALK","READ","OPEN","PLAY","STOP","HELP","GIVE","MAKE","FIND","LOOK","SHOW","DRAW","WASH","CLEAN","GROW","BLOW","GLOW","FLOW","FALL","DROP","HOLD","TAKE","KEEP","SEEK","HIDE","FIND","LOST","WINS","SAVE","TURN","MOVE","STEP","KICK"];
    
    function generateThousandWordPool() {
        let pool = [];
        let combined = [...new Set([...BASE_NOUNS, ...BASE_VERBS])];
        
        combined.forEach((word) => {
            let hints = [
                `A 4-letter puzzle word starting with "${word[0]}" and ending with "${word[3]}".`,
                `Unscramble these letters to reveal a common 4-letter word.`,
                `Contains the vowel "${word.match(/[AEIOU]/g)?.[0] || 'E'}".`
            ];
            
            for(let i=0; i < 10; i++) {
                if(pool.length >= 1000) break;
                pool.push({
                    word: word,
                    hint: hints[i % hints.length] + ` (Var #${i+1})`,
                    cat: i % 2 === 0 ? "General" : "Classic"
                });
            }
        });
        
        while(pool.length < 1000) {
            let fallbackWord = combined[pool.length % combined.length];
            pool.push({ word: fallbackWord, hint: "A common 4-letter word puzzle step.", cat: "Core" });
        }
        return pool;
    }

    const MASTER_POOL = generateThousandWordPool();
    let currentGameWords = []; 

    let currentLevel = 0;
    let currentWordIndex = 0;
    let score = 0;
    let activeWordObj = {};

    const scrambledWordDisplay = document.getElementById("scrambledWord");
    const hintBoxDisplay = document.getElementById("hintBox");
    const catDisplay = document.getElementById("catDisplay");
    const levelDisplay = document.getElementById("levelDisplay");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const userInput = document.getElementById("userInput");
    const checkBtn = document.getElementById("checkBtn");
    const resetBtn = document.getElementById("resetBtn");
    const gamePlayArea = document.getElementById("gamePlayArea");
    const feedback = document.getElementById("feedback");

    function setupActiveSessionData() {
        let poolCopy = [...MASTER_POOL];
        for (let i = poolCopy.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [poolCopy[i], poolCopy[j]] = [poolCopy[j], poolCopy[i]];
        }
        currentGameWords = poolCopy.slice(0, 100);
    }

    function scrambleWord(word) {
        let letters = word.split("");
        for (let i = letters.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [letters[i], letters[j]] = [letters[j], letters[i]];
        }
        let scrambled = letters.join("");
        if (scrambled === word) return scrambleWord(word);
        return scrambled;
    }

    function loadWord() {
        userInput.value = "";
        userInput.disabled = false;
        userInput.focus();
        checkBtn.disabled = false;
        
        levelDisplay.textContent = `Level ${currentLevel + 1}/10 (Word ${currentWordIndex + 1}/10)`;
        scoreDisplay.textContent = score;

        let absoluteIndex = (currentLevel * 10) + currentWordIndex;
        activeWordObj = currentGameWords[absoluteIndex];
        
        scrambledWordDisplay.textContent = scrambleWord(activeWordObj.word);
        hintBoxDisplay.textContent = `💡 Hint: ${activeWordObj.hint}`;
        catDisplay.textContent = activeWordObj.cat;
    }

    function checkAnswer() {
        initSFXEngine();
        const guess = userInput.value.trim().toUpperCase();

        if (!guess) {
            feedback.style.color = "var(--wrong)";
            feedback.textContent = "Please input a guess!";
            return;
        }

        if (guess === activeWordObj.word) {
            score += 1;
            scoreDisplay.textContent = score;
            feedback.style.color = "var(--correct)";
            feedback.textContent = "🎉 Correct!";
            playCorrectSFX();

            currentWordIndex++;
            if (currentWordIndex >= 10) {
                currentWordIndex = 0;
                currentLevel++;
            }

            if (currentLevel >= 10) {
                feedback.textContent = "👑 PERFECT VICTORY! You beat all 100 randomized terms!";
                gamePlayArea.classList.add('hidden');
                resetBtn.style.display = "block";
                return;
            }

            userInput.disabled = true;
            checkBtn.disabled = true;
            setTimeout(loadWord, 1000);
        } else {
            feedback.style.color = "var(--wrong)";
            feedback.innerHTML = `❌ Game Over!<br>Your Guess: "${guess}" was incorrect.<br>The Correct Word was: <strong>${activeWordObj.word}</strong>`;
            playWrongSFX();
            
            userInput.disabled = true;
            checkBtn.disabled = true;
            resetBtn.style.display = "block";
        }
    }

    function resetGame() {
        currentLevel = 0;
        currentWordIndex = 0;
        score = 0;
        feedback.textContent = "";
        resetBtn.style.display = "none";
        gamePlayArea.classList.remove('hidden');
        
        setupActiveSessionData();
        loadWord();
    }

    checkBtn.addEventListener("click", checkAnswer);
    resetBtn.addEventListener("click", resetGame);
    userInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !userInput.disabled) checkAnswer();
    });

    // Fire initialization routines
    setupActiveSessionData();
    initTrack();
    loadWord();
</script>

</body>
</html>
